# Runs on pull requests targeting master. Performs terraform plan only.
# Set _ENVIRONMENT per trigger (dev, stg, prd) to pick the matching *.tfvars file.
substitutions:
  _ENVIRONMENT: dev
  _TF_VERSION: "1.14.0"
  _PR_NUMBER: ""

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: python:3.12
    id: github-app-token
    entrypoint: bash
    secretEnv:
      - GH_APP_ID
      - GH_APP_INSTALLATION_ID
      - GH_APP_PRIVATE_KEY
    args:
      - -c
      - |
        set -euo pipefail
        pip install --quiet pyjwt cryptography requests
        python scripts/github-app-token.py > /workspace/github_token.txt

  - name: hashicorp/terraform:${_TF_VERSION}
    id: terraform-plan
    entrypoint: sh
    args:
      - -c
      - |
        set -euo pipefail

        GITHUB_TOKEN="$$(cat /workspace/github_token.txt)"
        git config --global url."https://x-access-token:$${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

        cd terraform

        ENV="${_ENVIRONMENT}"
        VAR_FILE="$${ENV}.tfvars"

        if [ ! -f "$${VAR_FILE}" ]; then
          echo "Missing $${VAR_FILE} for environment '$${ENV}'" >&2
          exit 1
        fi

        terraform fmt -check -recursive
        terraform init -input=false -backend-config="backend-config/$${ENV}.hcl"

        if terraform workspace list | sed 's/^[* ]*//g' | grep -qx "$${ENV}"; then
          terraform workspace select "$${ENV}"
        else
          terraform workspace new "$${ENV}"
        fi

        terraform validate
        terraform plan -input=false -var-file="$${VAR_FILE}" -out=tfplan
        terraform show -no-color tfplan > /workspace/plan-output.txt

  - name: python:3.12
    id: post-pr-comment
    waitFor:
      - terraform-plan
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [ -z "${_PR_NUMBER}" ]; then
          echo "Not a PR build (_PR_NUMBER unset); skipping plan comment"
          exit 0
        fi
        pip install --quiet requests
        PR_NUMBER="${_PR_NUMBER}" \
        REPO_FULL_NAME="$REPO_FULL_NAME" \
        ENVIRONMENT="${_ENVIRONMENT}" \
        python scripts/post-pr-comment.py

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GH_APP_ID/versions/latest
      env: GH_APP_ID
    - versionName: projects/$PROJECT_ID/secrets/GH_APP_INSTALLATION_ID/versions/latest
      env: GH_APP_INSTALLATION_ID
    - versionName: projects/$PROJECT_ID/secrets/GH_APP_PRIVATE_KEY/versions/latest
      env: GH_APP_PRIVATE_KEY
